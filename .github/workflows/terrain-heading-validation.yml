name: Terrain/Heading Wiring Validation

on:
  push:
    paths:
      - "game/ai/aiHeader.xs"
      - "game/ai/leaders/leaderCommon.xs"
      - "tools/validation/validate_terrain_heading.py"
      - "tests/validation/test_validate_terrain_heading.py"
      - ".github/workflows/terrain-heading-validation.yml"
  pull_request:
    paths:
      - "game/ai/aiHeader.xs"
      - "game/ai/leaders/leaderCommon.xs"
      - "tools/validation/validate_terrain_heading.py"
      - "tests/validation/test_validate_terrain_heading.py"
      - ".github/workflows/terrain-heading-validation.yml"

jobs:
  terrain-heading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate terrain/heading wiring
        run: python tools/validation/validate_terrain_heading.py
      - name: Validator unit tests
        run: python -m unittest tests.validation.test_validate_terrain_heading -v
