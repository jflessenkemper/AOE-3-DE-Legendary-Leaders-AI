name: XS Validation

on:
  push:
  pull_request:

jobs:
  xs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate XS scripts
        run: python tools/validation/validate_xs_scripts.py