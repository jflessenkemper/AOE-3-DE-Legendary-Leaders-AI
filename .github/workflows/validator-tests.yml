name: Validator Tests

on:
  push:
  pull_request:

jobs:
  validator-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run validator regression tests
        run: python -m unittest discover -s tests/validation -p 'test_*.py'