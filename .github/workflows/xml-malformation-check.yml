name: XML Malformation Check

on:
  push:
  pull_request:

jobs:
  xml-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate XML-like files
        run: python tools/validation/validate_xml_well_formed.py
