name: HomeCity Card Validation

on:
  push:
  pull_request:

jobs:
  homecity-card-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate homecity card links
        run: python tools/validation/validate_homecity_cards.py
