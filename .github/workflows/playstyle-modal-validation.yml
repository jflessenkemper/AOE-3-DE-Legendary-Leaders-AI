name: Playstyle Modal Validation

on:
  push:
    paths:
      - "LEGENDARY_LEADERS_TREE.html"
      - "tools/validation/validate_playstyle_modal.py"
      - "tests/validation/test_validate_playstyle_modal.py"
      - ".github/workflows/playstyle-modal-validation.yml"
  pull_request:
    paths:
      - "LEGENDARY_LEADERS_TREE.html"
      - "tools/validation/validate_playstyle_modal.py"
      - "tests/validation/test_validate_playstyle_modal.py"
      - ".github/workflows/playstyle-modal-validation.yml"

jobs:
  playstyle-modal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate playstyle modal data
        run: python tools/validation/validate_playstyle_modal.py
      - name: Validator unit tests
        run: python -m unittest tests.validation.test_validate_playstyle_modal -v
