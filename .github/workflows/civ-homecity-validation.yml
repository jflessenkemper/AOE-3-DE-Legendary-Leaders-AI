name: Civ HomeCity Validation

on:
  push:
  pull_request:

jobs:
  civ-homecity-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate civ and homecity linkage
        run: python tools/validation/validate_civ_homecities.py
