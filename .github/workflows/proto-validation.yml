name: Proto Validation

on:
  push:
  pull_request:

jobs:
  proto-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate Proto
        run: python tools/validation/validate_protomods.py
