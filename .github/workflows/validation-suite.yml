name: Validation Suite

on:
  push:
  pull_request:

jobs:
  validation-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run validator regression tests
        run: python -m unittest discover -s tests/validation -p 'test_*.py'
      - name: Run packaged validation
        run: python tools/validation/validate_packaged_mod.py --report-file .validation-reports/package-validation-report.txt
      - name: Run content validation suite
        run: |
          python tools/validation/validate_civ_crossrefs.py
          python tools/validation/validate_civ_homecities.py
          python tools/validation/validate_homecity_cards.py
          python tools/validation/validate_civmods_ui.py
          python tools/validation/validate_protomods.py
          python tools/validation/validate_stringtables.py
          python tools/validation/validate_techtree.py
          python tools/validation/validate_xml_well_formed.py
          python tools/validation/validate_xs_scripts.py
          python tools/validation/validate_personality_overrides.py
          python tools/validation/validate_terrain_heading.py
          python tools/validation/validate_playstyle_modal.py
      - name: Publish packaged validation summary
        if: always()
        run: |
          {
            echo "## Packaged Validation Report"
            echo
            echo '```text'
            cat .validation-reports/package-validation-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload packaged validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-suite-package-report
          path: .validation-reports/package-validation-report.txt
          if-no-files-found: error