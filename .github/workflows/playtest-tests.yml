name: Playtest Harness Tests

on:
  push:
    paths:
      - "tools/playtest/**"
      - "tests/playtest/**"
      - "tools/validation/validate_terrain_heading.py"
      - "game/ai/leaders/leaderCommon.xs"
      - "game/ai/aiHeader.xs"
      - "data/civmods.xml"
      - "data/homecity*.xml"
      - "data/rvltmodhomecity*.xml"
      - ".github/workflows/playtest-tests.yml"
  pull_request:
    paths:
      - "tools/playtest/**"
      - "tests/playtest/**"
      - "tools/validation/validate_terrain_heading.py"
      - "game/ai/leaders/leaderCommon.xs"
      - "game/ai/aiHeader.xs"
      - "data/civmods.xml"
      - "data/homecity*.xml"
      - "data/rvltmodhomecity*.xml"
      - ".github/workflows/playtest-tests.yml"

jobs:
  playtest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Pillow
        run: python -m pip install --upgrade pip Pillow
      - name: Run playtest harness unit tests
        run: python -m unittest discover -s tests/playtest -p 'test_*.py' -t .
      - name: Smoke-test preflight ground-truth printer
        run: python -m tools.playtest.preflight --markdown | head -25
