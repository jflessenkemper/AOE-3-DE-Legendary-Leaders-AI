name: Civ Crossref Validation

on:
  push:
  pull_request:

jobs:
  civ-crossref-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate civ string and tech cross-references
        run: python tools/validation/validate_civ_crossrefs.py
