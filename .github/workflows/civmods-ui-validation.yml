name: Civmods UI Validation

on:
  push:
  pull_request:

jobs:
  civmods-ui-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate civmods UI fields and assets
        run: python tools/validation/validate_civmods_ui.py