<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Legendary Leaders — 3D Map Placement</title>
<style>
  html,body{margin:0;padding:0;background:#0a0a0a;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100%;}
  #app{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}
  #hud{position:fixed;top:8px;left:8px;right:8px;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);padding:8px 12px;border-radius:8px;font-size:13px;z-index:10;max-width:520px;}
  #hud strong{color:#ffcc80;}
  #hud .small{font-size:11px;opacity:0.7;margin-top:4px;}
  #picker{position:fixed;bottom:14px;left:8px;right:8px;z-index:10;display:flex;gap:8px;align-items:center;}
  select{flex:1;font-family:inherit;font-size:14px;padding:9px 10px;background:#1a1a1a;color:#fff;border:1px solid #555;border-radius:6px;-webkit-appearance:none;appearance:none;}
  #back{padding:9px 14px;background:#37474f;color:#fff;border:1px solid #555;border-radius:6px;font-family:inherit;font-size:14px;cursor:pointer;text-decoration:none;}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;z-index:100;font-size:16px;color:#aaa;}
  #fps{position:fixed;top:8px;right:8px;background:rgba(0,0,0,0.5);padding:3px 7px;border-radius:4px;font-size:11px;z-index:10;font-family:monospace;color:#9e9e9e;}
</style>
</head>
<body>
<div id="loading">Loading 3D scene…</div>
<div id="app"></div>
<div id="hud">
  <div><strong id="hudTitle">—</strong></div>
  <div class="small" id="hudSubtitle">One-finger rotate · Two-finger pan · Pinch to zoom</div>
</div>
<div id="fps">— fps</div>
<div id="picker">
  <select id="nationSelect"></select>
  <a href="LEGENDARY_LEADERS_TREE.html" id="back">← Back</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { Water } from 'three/addons/objects/Water.js';

/* ====================================================================
   Legendary Leaders — 3D Map Placement scene
   World coordinates mirror the 2D modal exactly: 600x600 unit canvas.
   2D (x, y) maps to 3D (x - 300, _, y - 300) with Y as up.
   This keeps the placement math (terrainAnchor / headingAnchor / blend)
   bit-identical to LEGENDARY_LEADERS_TREE.html so all 48 profiles render
   in the same positions in 3D as they do in the 2D modal.
==================================================================== */

const MAP_SIZE = 600;
const HALF = MAP_SIZE / 2;

/* === Renderer === */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);  // pure black so the map is the focus
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// No fog — user wants full map visible at any zoom level.

/* === Camera + touch controls — RTS-style top-down with slight tilt === */
const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 1, 2500);
camera.position.set(0, 420, 320);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2 - 0.15;  // never go fully horizontal
controls.minPolarAngle = 0.2;                // and not straight down either
controls.minDistance = 150;
controls.maxDistance = 1000;
controls.target.set(0, 0, 0);

/* === Lighting — bright warm golden-hour for AoE3 feel + shadows === */
scene.add(new THREE.HemisphereLight(0xfff0d4, 0x4a5d2a, 1.5));
const sun = new THREE.DirectionalLight(0xfff2dc, 1.8);
sun.position.set(180, 360, 180);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -350;
sun.shadow.camera.right = 350;
sun.shadow.camera.top = 350;
sun.shadow.camera.bottom = -350;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 1000;
sun.shadow.bias = -0.0008;
sun.shadow.normalBias = 0.04;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xb0c8e8, 0.45);  // cool sky fill
fill.position.set(-200, 250, -180);
scene.add(fill);
const ambient = new THREE.AmbientLight(0xffe6b8, 0.35);
scene.add(ambient);

/* === Kenney CC0 model registry ===
   FBX models from the Castle Kit + Nature Kit (kenney.nl, CC0). Loaded once
   at startup, cloned per placement. Each model is normalized so its tallest
   axis equals 1.0 unit; we then scale it to a target height in world units.
==================================================================== */
const MODEL_FILES = [
  'tower_base','tower_mid','tower_top_roof',
  'house_body','house_roof',
  'outpost_base','outpost_top',
  'wall','wall_corner','gate','flag',
  'tree_oak','tree_palm','tree_cypress',
  'cliff_block','cliff_top','rock_large','bush'
];
const MODELS = {};
const gltfLoader = new GLTFLoader();

async function loadModels(){
  // Sequential load so we can see exactly which one fails. A single bad
  // GLB won't hang the app — fallback to an empty group so spawn() returns
  // null gracefully and the building/decoration is just absent.
  for(let i = 0; i < MODEL_FILES.length; i++){
    const name = MODEL_FILES[i];
    const status = document.getElementById('loading');
    if(status) status.textContent = `Loading model ${i+1}/${MODEL_FILES.length}: ${name}`;
    try {
      const gltf = await gltfLoader.loadAsync('resources/3d/models/' + name + '.glb');
      const root = gltf.scene;
      const bbox = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3(); bbox.getSize(size);
      const tallest = Math.max(size.x, size.y, size.z) || 1;
      root.scale.multiplyScalar(1 / tallest);
      const c = new THREE.Vector3(); bbox.getCenter(c);
      root.position.set(-c.x/tallest, -bbox.min.y/tallest, -c.z/tallest);
      const wrap = new THREE.Group();
      wrap.add(root);
      wrap.traverse((c) => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });
      MODELS[name] = wrap;
    } catch(err){
      console.error('GLB load failed:', name, err);
      const errEl = document.getElementById('loading');
      if(errEl){
        errEl.style.background = '#3a1010';
        errEl.style.padding = '16px';
        errEl.innerHTML = `<div style="color:#ff8a80">Failed to load <b>${name}.glb</b></div><div style="font-size:11px;margin-top:6px;color:#aaa">${(err && err.message) || err}</div><div style="font-size:11px;margin-top:6px;color:#aaa">Continuing without it…</div>`;
      }
      MODELS[name] = new THREE.Group();
      await new Promise(r => setTimeout(r, 800));
    }
  }
}

/* Spawn one instance of a model into a parent group, anchored on terrain.
   targetSize is the desired world-unit *height* of the model.
   opts.tint applies a per-instance color (must clone material first since
   three.js shares materials across clones by default). */
function spawn(parent, key, modX, modY, targetSize, opts){
  const tpl = MODELS[key];
  if(!tpl){ console.warn('missing model:', key); return null; }
  const m = tpl.clone(true);
  const p = to3(modX, modY);
  m.scale.setScalar(targetSize);
  m.rotation.y = (opts && opts.rotY !== undefined) ? opts.rotY : Math.random() * Math.PI * 2;
  m.position.set(p.x, biomeHeight(p.x, p.z) + (opts && opts.yOffset || 0), p.z);
  if(opts && opts.tint !== undefined){
    const t = new THREE.Color(opts.tint);
    m.traverse((c) => {
      if(c.isMesh && c.material){
        const mats = Array.isArray(c.material) ? c.material : [c.material];
        for(let i=0;i<mats.length;i++){
          const cloned = mats[i].clone();
          if(cloned.color) cloned.color.copy(t);
          if(Array.isArray(c.material)) c.material[i] = cloned;
          else c.material = cloned;
        }
      }
    });
  }
  parent.add(m);
  return m;
}

/* Per-building palette — picks a recognizable color per type so a
   glance at the scene tells you what's what. Materials are tinted on
   the cloned PBR base, so the texture detail still shows through. */
const TINT = {
  TC:        0xc62828,  // red — Town Center
  HOUSE:     0xffb74d,  // warm yellow — houses
  MILL:      0x7cb342,  // green roof — economy
  BARRACKS:  0x1976d2,  // military blue
  OUTPOST:   0x7e57c2,  // purple — defensive
  FWD_TOWER: 0xfb8c00,  // orange — forward push
  FORT:      0x4e342e,  // dark stone — heavy fortification
  WALL:      0x9e9e9e,  // grey stone
  GOLD:      0xffd54f,  // gold
  HUNT:      0x6d4c41,  // brown — animal silhouette stand-in
  BERRY:     0xc62828,  // red — berries
  TRADE:     0xffb74d,  // gold/orange — trade post
  NATIVE:    0xa1887f,  // tan — native settlement
  FLAG:      0xfff59d,  // pale flag cloth
};

/* === Coord helpers ===
   2D modal uses (x: 0..600 left-right, y: 0..600 top-bottom).
   3D uses (x left-right, z front-back).
   We map: world.x = mod.x - 300; world.z = mod.y - 300.
   So the 2D "spawn" at (300, 330) becomes 3D (0, _, 30).             */
function to3(modX, modY){ return { x: modX - HALF, z: modY - HALF }; }

/* === Terrain heightmap ===
   Biome-driven elevation: highland raised, oasis dipped, coast at sea level.
   Procedural color per vertex so each biome reads instantly.            */
const TERRAIN_SEG = 96;
const terrainGeom = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, TERRAIN_SEG, TERRAIN_SEG);
terrainGeom.rotateX(-Math.PI/2);

function biomeHeight(wx, wz){
  // Bayou layout: 2D-space coords match LEGENDARY_LEADERS_TREE.html exactly.
  const x = wx + HALF, z = wz + HALF;
  // E limestone bluff in TWO sections with chokepoint gap at z=290..325
  const inHighlandX = x > 460 && x < 580;
  let highland = 0;
  if(inHighlandX){
    if(z > 195 && z < 290){
      const t = Math.min((z-195)/40, (290-z)/40, (580-x)/40, (x-460)/40);
      highland = Math.max(0, t) * 36;
    } else if(z > 325 && z < 400){
      const t = Math.min((z-325)/40, (400-z)/40, (580-x)/40, (x-460)/40);
      highland = Math.max(0, t) * 36;
    }
  }
  // NW sand barrier dunes (small, near-coast)
  const dd = Math.hypot(x-55, z-220);
  const dune = Math.max(0, 1 - dd/55) * 3 * Math.sin((x+z)*0.05);
  // Open Gulf coast: drop below sea level (z<60)
  const coast = z < 60 ? -8 - (60 - z) * 0.18 : 0;
  // Bayou inlet — main waterway, dropped below grade in a band along the curve
  // Approximate the curve "M 90 60 Q 130 150 200 220 Q 250 290 280 380 Q 320 480 380 600"
  // with several piecewise center points and a per-point distance check.
  const inletPts = [
    [90,60],[130,150],[200,220],[250,290],[280,380],[320,480],[380,600]
  ];
  let inletDip = 0;
  for(let i=0;i<inletPts.length-1;i++){
    const ax=inletPts[i][0], az=inletPts[i][1];
    const bx=inletPts[i+1][0], bz=inletPts[i+1][1];
    // distance from point (x,z) to line segment a-b
    const lx=bx-ax, lz=bz-az;
    const len2=lx*lx+lz*lz;
    let t = ((x-ax)*lx + (z-az)*lz) / Math.max(len2, 1);
    if(t<0) t=0; else if(t>1) t=1;
    const px=ax+lx*t, pz=az+lz*t;
    const d = Math.hypot(x-px, z-pz);
    if(d < 18){
      const dipHere = -3 - (18 - d) * 0.25;
      if(dipHere < inletDip) inletDip = dipHere;
    }
  }
  // Wetland marsh — broad NW patch
  const dw1 = Math.hypot(x-180, z-190);
  const dw2 = Math.hypot(x-160, z-135);
  const dw3 = Math.hypot(x-270, z-350);
  const wetland = Math.min(dw1, dw2, dw3) < 60 ? -1.2 : 0;
  return highland + dune + coast + inletDip + wetland;
}

const pos = terrainGeom.attributes.position;
for(let i=0; i<pos.count; i++){
  const x = pos.getX(i), z = pos.getZ(i);
  pos.setY(i, biomeHeight(x, z));
}
terrainGeom.computeVertexNormals();

const colors = new Float32Array(pos.count * 3);
/* Distance to the bayou inlet path — used to brown-mottle the ground
   anywhere near the water. This is what makes the surrounding land
   read as marshy/silty rather than uniform prairie. */
const _inletPts = [[90,60],[130,150],[200,220],[250,290],[280,380],[320,480],[380,600]];
function distToInlet(x, z){
  let best = 1e9;
  for(let i=0;i<_inletPts.length-1;i++){
    const ax=_inletPts[i][0], az=_inletPts[i][1];
    const bx=_inletPts[i+1][0], bz=_inletPts[i+1][1];
    const lx=bx-ax, lz=bz-az;
    const len2=lx*lx+lz*lz;
    let t = ((x-ax)*lx + (z-az)*lz) / Math.max(len2, 1);
    if(t<0) t=0; else if(t>1) t=1;
    const px=ax+lx*t, pz=az+lz*t;
    const d = Math.hypot(x-px, z-pz);
    if(d < best) best = d;
  }
  return best;
}

function biomeColor(wx, wz){
  const x = wx + HALF, z = wz + HALF;
  // Open Gulf water
  if(z < 60) return [0.21, 0.36, 0.36];
  // NW sand barrier (small "desert" pocket)
  if(Math.hypot(x-55, z-220) < 55) return [0.78, 0.66, 0.40];
  // Highland by elevation
  if(biomeHeight(wx, wz) > 10) return [0.42, 0.30, 0.22];
  // Bayou wetland (broad NW + along inlet)
  if(Math.hypot(x-180, z-190) < 75) return [0.22, 0.34, 0.27];
  if(Math.hypot(x-160, z-135) < 50) return [0.22, 0.34, 0.27];
  if(Math.hypot(x-270, z-350) < 45) return [0.22, 0.34, 0.27];
  // S dense cypress (jungle)
  if(z > 515 && x > 240 && x < 510) return [0.11, 0.28, 0.16];
  // NE cypress floor
  if(x > 410 && x < 560 && z > 70 && z < 220) return [0.18, 0.32, 0.18];
  // SW cypress floor
  if(x > 75 && x < 180 && z > 425 && z < 525) return [0.18, 0.32, 0.18];
  // Mottle ground near the inlet with marsh-brown for bayou character
  const dInlet = distToInlet(x, z);
  if(dInlet < 60){
    const w = 1 - dInlet/60;
    // Blend darker bayou-brown into the plain green
    const r = 0.32*(1-w*0.7) + 0.41*w*0.7;
    const g = 0.42*(1-w*0.7) + 0.32*w*0.7;
    const b = 0.24*(1-w*0.7) + 0.18*w*0.7;
    return [r, g, b];
  }
  return [0.32, 0.42, 0.24];
}
for(let i=0; i<pos.count; i++){
  const c = biomeColor(pos.getX(i), pos.getZ(i));
  colors[i*3]=c[0]; colors[i*3+1]=c[1]; colors[i*3+2]=c[2];
}
terrainGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
/* Smooth-shaded terrain with a tiled CC0 grass texture multiplied by the
   biome vertex colors. The texture provides the missing ground detail
   (grass blades, dirt patches); the vertex color tints it per biome
   (sand pockets shift tan, marsh shifts darker, etc.). */
{
  const cAttr = terrainGeom.attributes.color;
  for(let i=0; i<cAttr.count; i++){
    const j = (Math.sin(i*12.9898) * 43758.5453) % 1;
    const wob = (j - 0.5) * 0.05;
    cAttr.setXYZ(i, cAttr.getX(i)+wob, cAttr.getY(i)+wob*0.7, cAttr.getZ(i)+wob*0.4);
  }
}
const _texLoader = new THREE.TextureLoader();
const _grassTex = _texLoader.load('resources/3d/textures/aerial_grass_rock_512.jpg');
_grassTex.wrapS = _grassTex.wrapT = THREE.RepeatWrapping;
_grassTex.repeat.set(12, 12);   // tile across the terrain
_grassTex.colorSpace = THREE.SRGBColorSpace;
const terrainMat = new THREE.MeshLambertMaterial({
  vertexColors: true,
  map: _grassTex
});
const terrain = new THREE.Mesh(terrainGeom, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

/* === Open Gulf — three.js Water shader (animated ripples + reflection) === */
const _waterNormals = _texLoader.load('resources/3d/textures/waternormals.jpg', (t) => {
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
});
const seaGeom = new THREE.PlaneGeometry(MAP_SIZE * 1.4, 80);
const sea = new Water(seaGeom, {
  textureWidth: 256, textureHeight: 256,
  waterNormals: _waterNormals,
  sunDirection: new THREE.Vector3(0.4, 0.8, 0.4).normalize(),
  sunColor: 0xfff2dc,
  waterColor: 0x1d4a48,           // brackish green-grey — bayou Gulf tone
  distortionScale: 2.4,
  fog: false
});
sea.rotation.x = -Math.PI/2;
sea.position.set(0, -2, -HALF + 30);
scene.add(sea);

/* Deep-water NW Gulf bulge — second Water instance with darker tone */
const deepGulfGeom = new THREE.CircleGeometry(110, 32);
const deepGulf = new Water(deepGulfGeom, {
  textureWidth: 128, textureHeight: 128,
  waterNormals: _waterNormals,
  sunDirection: new THREE.Vector3(0.4, 0.8, 0.4).normalize(),
  sunColor: 0xfff2dc,
  waterColor: 0x0c2826,
  distortionScale: 1.8,
  fog: false
});
deepGulf.rotation.x = -Math.PI/2;
const dg = to3(70, 50);
deepGulf.position.set(dg.x, -2.5, dg.z);
scene.add(deepGulf);

/* Bayou inlet — chain of tinted plane segments. Real Water per-segment
   would render reflection N times per frame and torch phone perf, so
   instead we use Phong with the water normal map for cheap shimmer.
   The normalMap UV offset is animated in the render loop. */
const _inletNormal = _texLoader.load('resources/3d/textures/waternormals.jpg', (t) => {
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(2, 2);
});
const inletMat = new THREE.MeshPhongMaterial({
  color: 0x32412a, transparent: true, opacity: 0.93, shininess: 110,
  specular: 0x9ab070, normalMap: _inletNormal, normalScale: new THREE.Vector2(0.7, 0.7)
});

/* Wide bayou pool at the central section of the inlet — using Water shader
   here gives visible ripples + reflection where the player will be looking. */
const inletPoolGeom = new THREE.CircleGeometry(75, 32);
const inletPool = new Water(inletPoolGeom, {
  textureWidth: 256, textureHeight: 256,
  waterNormals: _waterNormals,
  sunDirection: new THREE.Vector3(0.4, 0.8, 0.4).normalize(),
  sunColor: 0xfff2dc,
  waterColor: 0x3d4f2a,            // muddy bayou green
  distortionScale: 2.2,
  fog: false
});
inletPool.rotation.x = -Math.PI/2;
const ip = to3(245, 290);
inletPool.position.set(ip.x, -2, ip.z);
scene.add(inletPool);

/* Track all Water instances so the animation loop can advance their time */
const _waters = [sea, deepGulf, inletPool];

/* === Tiny oasis pool inside the W sand barrier (still bluish — desert oasis is fresh) === */
const oasisGeom = new THREE.CircleGeometry(13, 18);
oasisGeom.rotateX(-Math.PI/2);
const oasis = new THREE.Mesh(oasisGeom, new THREE.MeshPhongMaterial({ color: 0x2780b6, transparent: true, opacity: 0.92, shininess: 100 }));
const oa = to3(55, 225);
oasis.position.set(oa.x, -1.5, oa.z);
scene.add(oasis);

/* === Bayou inlet — main waterway. NW Gulf (90,60) -> SE exit. === */
const riverPath = [];
const bayouCurves = [
  [[90,60],[130,150],[200,220]],
  [[200,220],[250,290],[280,380]],
  [[280,380],[320,480],[380,600]]
];
for(const c of bayouCurves){
  for(let t=0; t<=1.001; t+=0.05){
    const u = t;
    const x = (1-u)*(1-u)*c[0][0] + 2*(1-u)*u*c[1][0] + u*u*c[2][0];
    const y = (1-u)*(1-u)*c[0][1] + 2*(1-u)*u*c[1][1] + u*u*c[2][1];
    riverPath.push([x, y]);
  }
}
function addRiver(){
  for(let i=0; i<riverPath.length-1; i++){
    const a = riverPath[i], b = riverPath[i+1];
    const aw = to3(a[0], a[1]), bw = to3(b[0], b[1]);
    const dx = bw.x - aw.x, dz = bw.z - aw.z;
    const len = Math.hypot(dx, dz);
    if(len < 0.5) continue;
    const angle = Math.atan2(dz, dx);
    const seg = new THREE.Mesh(
      new THREE.PlaneGeometry(len + 6, 36),
      inletMat
    );
    seg.rotation.x = -Math.PI/2;
    seg.rotation.z = -angle;
    seg.position.set((aw.x+bw.x)/2, -1, (aw.z+bw.z)/2);
    scene.add(seg);
  }
}
addRiver();

/* === Forests now use Kenney tree models (cloned per instance).
       Tree size in world units is set via spawn()'s targetSize. */
function placeForest(positions, modelKey, baseSize){
  for(const p of positions){
    const s = baseSize * (0.85 + Math.random()*0.4);
    spawn(scene, modelKey, p[0], p[1], s);
  }
}

/* === All decorative scatter — runs after Kenney models load === */
function placeDecorations(){
  /* Cypress forests at the two land clusters + dense southern band (jungle) */
  const ne = [];
  for(let i=0; i<28; i++) ne.push([410 + Math.random()*150, 75 + Math.random()*145]);
  placeForest(ne, 'tree_cypress', 26);

  const sw = [];
  for(let i=0; i<14; i++) sw.push([80 + Math.random()*105, 430 + Math.random()*100]);
  placeForest(sw, 'tree_oak', 24);

  const jungle = [];
  for(let i=0; i<22; i++) jungle.push([245 + Math.random()*260, 520 + Math.random()*55]);
  placeForest(jungle, 'tree_palm', 30);

  /* Highland plateau — Kenney cliff blocks at the cliff edges */
  const cliffN = [
    [475,210],[495,210],[515,210],[540,212],[560,215],
    [475,260],[505,265],[540,270],[565,260],
    [475,290],[510,290]
  ];
  const cliffS = [
    [475,330],[505,330],[540,330],[570,335],
    [475,365],[510,365],[545,365],[575,365],
    [475,395],[510,395],[545,395]
  ];
  for(const c of cliffN) spawn(scene, 'cliff_block', c[0], c[1], 38);
  for(const c of cliffS) spawn(scene, 'cliff_block', c[0], c[1], 38);
  /* Cliff top capstones at exposed corners for sharp silhouette */
  for(const c of [[490,210],[540,210],[565,260],[490,395],[545,395]]){
    spawn(scene, 'cliff_top', c[0], c[1], 16, { yOffset: 36 });
  }
  /* Loose boulders along cliff base */
  for(const c of [[465,225],[465,275],[465,360],[465,395],[585,255],[585,365]]){
    spawn(scene, 'rock_large', c[0], c[1], 14);
  }

  /* Gold deposits — bright yellow rock cluster (you can spot them) */
  for(const g of [[115,285],[395,130],[425,460]]){
    spawn(scene, 'rock_large', g[0], g[1], 18, { tint: TINT.GOLD });
    for(let i=0;i<3;i++){
      spawn(scene, 'rock_large', g[0] + (i-1)*8, g[1] + (i%2)*6 - 3, 8, { tint: TINT.GOLD });
    }
  }

  /* Hunt herds — brown-tinted bushes stand in for animals */
  for(const h of [[330,215],[355,230],[345,250],[170,410],[195,425]]){
    spawn(scene, 'bush', h[0], h[1], 6, { tint: TINT.HUNT });
  }

  /* Berry bushes — red-tinted */
  spawn(scene, 'bush', 395, 320, 8, { tint: TINT.BERRY });
  spawn(scene, 'bush', 410, 335, 8, { tint: TINT.BERRY });

  /* Trade sockets — gold-tinted gates so they read as commerce */
  for(const ts of [[90,540],[330,330],[555,120]]){
    spawn(scene, 'gate', ts[0], ts[1], 18, { rotY: Math.PI/4, tint: TINT.TRADE });
  }

  /* Native settlements — tan-tinted small houses, distinct from player builds */
  for(const n of [[135,290],[265,530],[440,360]]){
    const offsets = [[0,-7],[-9,5],[9,5]];
    for(const o of offsets){
      spawn(scene, 'house_body', n[0]+o[0], n[1]+o[1], 9, { rotY: Math.random()*Math.PI*2, tint: TINT.NATIVE });
      spawn(scene, 'house_roof', n[0]+o[0], n[1]+o[1], 9, { yOffset: 9, tint: TINT.NATIVE });
    }
  }

  /* Gulf barrier islands NW (Bayou convention) */
  function addBarrierIsland(modX, modY, r){
    const p = to3(modX, modY);
    const isl = new THREE.Mesh(
      new THREE.CylinderGeometry(r*0.85, r, 6, 16),
      new THREE.MeshLambertMaterial({ color: 0x6a8a48 })
    );
    isl.position.set(p.x, -2, p.z);
    scene.add(isl);
  }
  addBarrierIsland(55, 35, 26);
  addBarrierIsland(115, 50, 14);
  spawn(scene, 'tree_palm', 55, 35, 22, { yOffset: 6 });

  /* Cypress standing IN the bayou inlet — signature bayou silhouette.
     Sample points along the inlet curve and place trees with random
     lateral offset, accepting submerged trunks. */
  const inletStandingTrees = [];
  for(let s=0; s<bayouCurves.length; s++){
    const c = bayouCurves[s];
    for(let t=0.12; t<=0.92; t+=0.18){
      const u = t;
      const cx = (1-u)*(1-u)*c[0][0] + 2*(1-u)*u*c[1][0] + u*u*c[2][0];
      const cy = (1-u)*(1-u)*c[0][1] + 2*(1-u)*u*c[1][1] + u*u*c[2][1];
      // Two trees per sample, on opposite sides of the channel
      const dx = c[2][0] - c[0][0], dy = c[2][1] - c[0][1];
      const norm = Math.hypot(dx, dy) || 1;
      const nx = -dy/norm, ny = dx/norm;
      const off = 12 + Math.random()*6;
      inletStandingTrees.push([cx + nx*off, cy + ny*off]);
      inletStandingTrees.push([cx - nx*off, cy - ny*off]);
    }
  }
  for(const p of inletStandingTrees){
    spawn(scene, 'tree_cypress', p[0], p[1], 22 * (0.85 + Math.random()*0.3), { yOffset: -2 });
  }

  /* Reed/grass tufts along all water edges */
  const reedBeds = [];
  // Along bayou inlet — close to water but on land
  for(let s=0; s<bayouCurves.length; s++){
    const c = bayouCurves[s];
    for(let t=0.05; t<=0.95; t+=0.10){
      const u = t;
      const cx = (1-u)*(1-u)*c[0][0] + 2*(1-u)*u*c[1][0] + u*u*c[2][0];
      const cy = (1-u)*(1-u)*c[0][1] + 2*(1-u)*u*c[1][1] + u*u*c[2][1];
      const dx = c[2][0] - c[0][0], dy = c[2][1] - c[0][1];
      const norm = Math.hypot(dx, dy) || 1;
      const nx = -dy/norm, ny = dx/norm;
      reedBeds.push([cx + nx*22 + (Math.random()-0.5)*8, cy + ny*22 + (Math.random()-0.5)*8]);
      reedBeds.push([cx - nx*22 + (Math.random()-0.5)*8, cy - ny*22 + (Math.random()-0.5)*8]);
    }
  }
  // Coast strip (north shore beach)
  for(let i=0; i<14; i++){
    reedBeds.push([40 + i*42 + (Math.random()-0.5)*10, 65 + (Math.random()-0.5)*6]);
  }
  // Around oasis
  for(let r=0;r<6;r++){
    const a = r*Math.PI/3;
    reedBeds.push([55 + Math.cos(a)*22, 225 + Math.sin(a)*22]);
  }
  for(const r of reedBeds){
    spawn(scene, 'bush', r[0], r[1], 4, { tint: 0x6b7d3c });
  }
}

/* === Per-nation building group (cleared and rebuilt per profile) === */
const buildingGroup = new THREE.Group();
scene.add(buildingGroup);

function clearBuildings(){
  while(buildingGroup.children.length){
    const c = buildingGroup.children[0];
    buildingGroup.remove(c);
    if(c.geometry) c.geometry.dispose();
    if(c.material) c.material.dispose();
  }
}

/* Building placement — Kenney Castle Kit GLB models, cloned + tinted
   per type so the scene is glance-readable. */
function placeTC(modX, modY){
  spawn(buildingGroup, 'tower_base',     modX, modY, 22, { tint: TINT.TC });
  spawn(buildingGroup, 'tower_mid',      modX, modY, 22, { yOffset: 22, tint: TINT.TC });
  spawn(buildingGroup, 'tower_top_roof', modX, modY, 22, { yOffset: 44, tint: TINT.TC });
  spawn(buildingGroup, 'flag',           modX, modY, 18, { yOffset: 56, tint: TINT.FLAG });
}
function placeHouse(modX, modY){
  spawn(buildingGroup, 'house_body', modX, modY, 14, { tint: TINT.HOUSE });
  spawn(buildingGroup, 'house_roof', modX, modY, 14, { yOffset: 14, tint: TINT.HOUSE });
}
function placeMill(modX, modY){
  spawn(buildingGroup, 'house_body', modX, modY, 18, { tint: TINT.MILL });
  spawn(buildingGroup, 'house_roof', modX, modY, 18, { yOffset: 18, tint: TINT.MILL });
}
function placeBarracks(modX, modY){
  const m = spawn(buildingGroup, 'tower_base', modX, modY, 18, { tint: TINT.BARRACKS });
  if(m) m.scale.set(22, 18, 22);
  spawn(buildingGroup, 'flag', modX, modY, 16, { yOffset: 18, tint: TINT.BARRACKS });
}
function placeOutpost(modX, modY, isFwd){
  const tint = isFwd ? TINT.FWD_TOWER : TINT.OUTPOST;
  spawn(buildingGroup, 'outpost_base', modX, modY, 16, { tint });
  spawn(buildingGroup, 'outpost_top',  modX, modY, 16, { yOffset: 16, tint });
  if(isFwd){
    spawn(buildingGroup, 'flag', modX, modY, 12, { yOffset: 32, tint: TINT.FWD_TOWER });
  }
}
function placeFort(modX, modY){
  /* Star-fort: 4 corner walls + central tower stack, all in fort tone */
  const corners = [[-22,-22],[22,-22],[-22,22],[22,22]];
  for(const c of corners){
    spawn(buildingGroup, 'wall_corner', modX + c[0], modY + c[1], 16, { rotY: Math.atan2(c[1], c[0]), tint: TINT.FORT });
  }
  spawn(buildingGroup, 'tower_base',     modX, modY, 24, { tint: TINT.FORT });
  spawn(buildingGroup, 'tower_mid',      modX, modY, 24, { yOffset: 24, tint: TINT.FORT });
  spawn(buildingGroup, 'tower_top_roof', modX, modY, 24, { yOffset: 48, tint: TINT.FORT });
  spawn(buildingGroup, 'flag',           modX, modY, 20, { yOffset: 62, tint: TINT.FLAG });
}
function placeWallSeg(modX, modY){
  spawn(buildingGroup, 'wall', modX, modY, 9, { rotY: 0, tint: TINT.WALL });
}
function placeHeadingArrow(modX, modY, ang){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const len = 90;
  const shaft = new THREE.Mesh(
    new THREE.BoxGeometry(len, 2, 4),
    new THREE.MeshBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.85 })
  );
  shaft.position.set(p.x + Math.cos(ang)*len/2, h + 1, p.z + Math.sin(ang)*len/2);
  shaft.rotation.y = -ang;
  buildingGroup.add(shaft);
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(8, 14, 4),
    new THREE.MeshBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.9 })
  );
  head.rotation.z = -Math.PI/2;
  head.rotation.y = -ang;
  head.position.set(p.x + Math.cos(ang)*len, h + 1, p.z + Math.sin(ang)*len);
  buildingGroup.add(head);
}

/* === Placement math — bit-identical to LEGENDARY_LEADERS_TREE.html === */
const SPAWN_TC = { x: 300, y: 300 };
const FEATURE = {
  coast:    { x: 300, y:  35 },
  river:    { x: 250, y: 290 },
  forest:   { x: 470, y: 130 },
  plain:    { x: 300, y: 300 },
  highland: { x: 520, y: 290 },
  wetland:  { x: 180, y: 200 },
  desert:   { x:  60, y: 220 },
  jungle:   { x: 370, y: 545 }
};
const HEADING_TARGET = {
  alongCoast: { x: 555, y:  35 },
  upriver:    { x: 380, y: 560 },
  frontier:   { x: 575, y: 300 },
  islandHop:  { x:  55, y:  35 },
  outward:    null,
  trade:      { x:  90, y: 540 },
  defensive:  null
};
function terrainAnchor(tId){
  if(tId===1) return FEATURE.coast;
  if(tId===2) return FEATURE.river;
  if(tId===3) return FEATURE.forest;
  if(tId===4) return FEATURE.plain;
  if(tId===5) return FEATURE.highland;
  if(tId===6) return FEATURE.wetland;
  if(tId===7) return FEATURE.desert;
  if(tId===8) return FEATURE.jungle;
  return SPAWN_TC;
}
function headingAnchor(hId){
  if(hId===1) return HEADING_TARGET.alongCoast;
  if(hId===2) return HEADING_TARGET.upriver;
  if(hId===3) return HEADING_TARGET.frontier;
  if(hId===4) return HEADING_TARGET.islandHop;
  if(hId===6) return HEADING_TARGET.trade;
  return null;
}
function blend(a, b, s){
  if(!a) return b; if(!b) return a;
  return { x: a.x*(1-s) + b.x*s, y: a.y*(1-s) + b.y*s };
}

function renderProfile(profile){
  clearBuildings();
  const v = profile.v;

  let anchor = { x: SPAWN_TC.x, y: SPAWN_TC.y };
  const t1 = terrainAnchor(v.terrainPrimary);
  if(t1 && v.terrainPrimary !== 0) anchor = blend(anchor, t1, v.terrainBias);
  const t2 = terrainAnchor(v.terrainSecondary);
  if(t2 && v.terrainSecondary !== 0) anchor = blend(anchor, t2, v.terrainBias * 0.5);
  const hA = headingAnchor(v.heading);
  if(hA) anchor = blend(anchor, hA, v.headingBias);

  const cx = anchor.x, cy = anchor.y;
  let headingAngle = null;
  if(hA){
    const dx = hA.x - cx, dy = hA.y - cy;
    headingAngle = Math.atan2(dy, dx);
  }

  const houseR = 75 * v.houseMult;
  const ecoR   = 120 * v.ecoMult;
  const milR   = 160 * v.milMult;
  const wallR  = 195 * v.tcMult;

  // Walls first (under buildings)
  if(v.wallStrategy !== 5 && v.wallLevel > 0){
    const segCount = Math.max(20, Math.round(2*Math.PI*wallR/22));
    const ws = v.wallStrategy;
    const hAng = headingAngle || 0;
    for(let s=0; s<segCount; s++){
      const ang = s*(2*Math.PI/segCount);
      let keep = false;
      if(ws===0) keep = true;
      else if(ws===1){
        const rel = ((ang - hAng)%(2*Math.PI) + 2*Math.PI)%(2*Math.PI);
        keep = (rel<0.7) || (rel>2.0 && rel<2.7) || (rel>4.0 && rel<4.7);
      } else if(ws===2){
        keep = Math.sin(ang) > -0.15;
      } else if(ws===3){
        const relF = ((ang - hAng)%(2*Math.PI) + 2*Math.PI)%(2*Math.PI);
        keep = (relF < 1.4) || (relF > (2*Math.PI - 1.4));
      } else if(ws===4){
        keep = true;
      }
      if(!keep) continue;
      const r = (ws===4) ? wallR*0.75 : wallR;
      placeWallSeg(cx + Math.cos(ang)*r, cy + Math.sin(ang)*r);
    }
  }

  // Forts
  if(v.fortLevel > 0){
    for(let f=0; f<v.fortLevel; f++){
      const a = f*(2*Math.PI/v.fortLevel) + 1.7 + (headingAngle || 0);
      placeFort(cx + Math.cos(a)*milR*1.1, cy + Math.sin(a)*milR*1.1);
    }
  }

  // Barracks
  for(let b=0; b<3; b++){
    const a = b*(2*Math.PI/3) + 0.5 + (headingAngle || 0);
    placeBarracks(cx + Math.cos(a)*milR, cy + Math.sin(a)*milR);
  }

  // Mills
  for(let e=0; e<4; e++){
    const a = e*(2*Math.PI/4) + 0.8;
    placeMill(cx + Math.cos(a)*ecoR, cy + Math.sin(a)*ecoR);
  }

  // Outposts
  if(v.towerLevel > 0){
    const n = v.towerLevel + 1;
    for(let t=0; t<n; t++){
      const a = t*(2*Math.PI/n) + 1.4;
      placeOutpost(cx + Math.cos(a)*ecoR*1.05, cy + Math.sin(a)*ecoR*1.05);
    }
  }

  // Forward towers along heading
  if(v.fwdTowers > 0 && headingAngle !== null){
    for(let t=0; t<v.fwdTowers; t++){
      const td = wallR*0.95 + t*30;
      placeOutpost(cx + Math.cos(headingAngle)*td, cy + Math.sin(headingAngle)*td, true);
    }
  }

  // Houses
  for(let h=0; h<6; h++){
    const a = h*(2*Math.PI/6) + 0.3;
    placeHouse(cx + Math.cos(a)*houseR, cy + Math.sin(a)*houseR);
  }

  // Heading arrow on the ground
  if(headingAngle !== null){
    placeHeadingArrow(cx, cy, headingAngle);
  }

  // Town Center last
  placeTC(cx, cy);

  // HUD
  document.getElementById('hudTitle').textContent = profile.name + ' — ' + profile.leader;
  document.getElementById('hudSubtitle').innerHTML =
    '<strong>Terrain:</strong> ' + profile.terrainLabel +
    ' &nbsp;<strong>Heading:</strong> ' + profile.headingLabel +
    '<br/><strong>Walls:</strong> ' + profile.wallLabel +
    ' &nbsp;<strong>Style:</strong> ' + profile.style +
    '<br/><span style="opacity:.55">One-finger rotate · Two-finger pan · Pinch to zoom</span>';

  // Recenter the camera on the new TC position
  controls.target.set(to3(cx, cy).x, 8, to3(cx, cy).z);
}

/* === Profile data — fetch from main HTML === */
async function loadProfiles(){
  const res = await fetch('LEGENDARY_LEADERS_TREE.html', { cache: 'no-cache' });
  const txt = await res.text();
  const start = txt.indexOf('window.NATION_PROFILES');
  const end = txt.indexOf('})();', start) + 5;
  const code = txt.substring(start, end);
  // Run in this scope to populate window.NATION_PROFILES
  new Function(code)();
  return window.NATION_PROFILES;
}

/* Load Kenney FBX models, then place all decorative scatter, then load
   profile data. Loading screen stays up until everything is in. */
document.getElementById('loading').textContent = 'Loading 3D models…';
await loadModels();
document.getElementById('loading').textContent = 'Building map…';
placeDecorations();
document.getElementById('loading').textContent = 'Loading nation data…';
const profiles = await loadProfiles();

const sel = document.getElementById('nationSelect');
const standard = ["Aztecs","British","Chinese","Dutch","Ethiopians","French","Germans","Iroquois","Hausa","Inca","Indians","Italians","Japanese","Lakota","Maltese","Mexicans","Ottomans","Portuguese","Russians","Spanish","Swedish","Americans"];
function addOptGroup(label, keys){
  const og = document.createElement('optgroup');
  og.label = label;
  keys.forEach(k => {
    if(!profiles[k]) return;
    const o = document.createElement('option');
    o.value = k;
    o.textContent = profiles[k].name + ' — ' + profiles[k].leader;
    og.appendChild(o);
  });
  sel.appendChild(og);
}
addOptGroup('Standard civs', standard);
const revolutionKeys = Object.keys(profiles).filter(k => standard.indexOf(k)<0);
addOptGroup('Revolutions', revolutionKeys);

sel.addEventListener('change', () => renderProfile(profiles[sel.value]));

// Read ?nation=Foo from URL if present (so the modal can deep-link)
const initial = new URLSearchParams(location.search).get('nation') || 'Aztecs';
sel.value = profiles[initial] ? initial : 'Aztecs';
renderProfile(profiles[sel.value]);

document.getElementById('loading').style.display = 'none';

/* === Resize === */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* === Animation loop with FPS counter === */
const fpsEl = document.getElementById('fps');
let frames = 0, last = performance.now();
function tick(){
  requestAnimationFrame(tick);
  controls.update();
  // Advance the Water shaders' time uniform so ripples animate
  for(const w of _waters){
    if(w.material && w.material.uniforms && w.material.uniforms['time']){
      w.material.uniforms['time'].value += 1/60;
    }
  }
  // Drift the inlet normal map for cheap "flowing water" shimmer
  if(_inletNormal && _inletNormal.offset){
    _inletNormal.offset.x = (_inletNormal.offset.x + 0.0008) % 1;
    _inletNormal.offset.y = (_inletNormal.offset.y + 0.0003) % 1;
  }
  renderer.render(scene, camera);
  frames++;
  const now = performance.now();
  if(now - last > 1000){
    fpsEl.textContent = Math.round(frames * 1000 / (now - last)) + ' fps';
    frames = 0; last = now;
  }
}
tick();
