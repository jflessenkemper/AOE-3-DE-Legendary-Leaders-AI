<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ====================================================================
   Legendary Leaders — 3D Map Placement scene
   World coordinates mirror the 2D modal exactly: 600x600 unit canvas.
   2D (x, y) maps to 3D (x - 300, _, y - 300) with Y as up.
   This keeps the placement math (terrainAnchor / headingAnchor / blend)
   bit-identical to LEGENDARY_LEADERS_TREE.html so all 48 profiles render
   in the same positions in 3D as they do in the 2D modal.
==================================================================== */

const MAP_SIZE = 600;
const HALF = MAP_SIZE / 2;

/* === Renderer === */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x6ec6ff);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x6ec6ff, 700, 1400);

/* === Camera + touch controls — RTS-style top-down with slight tilt === */
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 2500);
camera.position.set(0, 520, 360);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2 - 0.15;  // never go fully horizontal
controls.minPolarAngle = 0.2;                // and not straight down either
controls.minDistance = 180;
controls.maxDistance = 1000;
controls.target.set(0, 0, 0);

/* === Lighting === */
scene.add(new THREE.HemisphereLight(0xfff5e0, 0x556b2f, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(220, 480, 240);
scene.add(sun);

/* === Coord helpers ===
   2D modal uses (x: 0..600 left-right, y: 0..600 top-bottom).
   3D uses (x left-right, z front-back).
   We map: world.x = mod.x - 300; world.z = mod.y - 300.
   So the 2D "spawn" at (300, 330) becomes 3D (0, _, 30).             */
function to3(modX, modY){ return { x: modX - HALF, z: modY - HALF }; }

/* === Terrain heightmap ===
   Biome-driven elevation: highland raised, oasis dipped, coast at sea level.
   Procedural color per vertex so each biome reads instantly.            */
const TERRAIN_SEG = 96;
const terrainGeom = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, TERRAIN_SEG, TERRAIN_SEG);
terrainGeom.rotateX(-Math.PI/2);

function biomeHeight(wx, wz){
  // Bayou layout: 2D-space coords match LEGENDARY_LEADERS_TREE.html exactly.
  const x = wx + HALF, z = wz + HALF;
  // E limestone bluff in TWO sections with chokepoint gap at z=290..325
  const inHighlandX = x > 460 && x < 580;
  let highland = 0;
  if(inHighlandX){
    if(z > 195 && z < 290){
      const t = Math.min((z-195)/40, (290-z)/40, (580-x)/40, (x-460)/40);
      highland = Math.max(0, t) * 36;
    } else if(z > 325 && z < 400){
      const t = Math.min((z-325)/40, (400-z)/40, (580-x)/40, (x-460)/40);
      highland = Math.max(0, t) * 36;
    }
  }
  // NW sand barrier dunes (small, near-coast)
  const dd = Math.hypot(x-55, z-220);
  const dune = Math.max(0, 1 - dd/55) * 3 * Math.sin((x+z)*0.05);
  // Open Gulf coast: drop below sea level (z<60)
  const coast = z < 60 ? -8 - (60 - z) * 0.18 : 0;
  // Bayou inlet — main waterway, dropped below grade in a band along the curve
  // Approximate the curve "M 90 60 Q 130 150 200 220 Q 250 290 280 380 Q 320 480 380 600"
  // with several piecewise center points and a per-point distance check.
  const inletPts = [
    [90,60],[130,150],[200,220],[250,290],[280,380],[320,480],[380,600]
  ];
  let inletDip = 0;
  for(let i=0;i<inletPts.length-1;i++){
    const ax=inletPts[i][0], az=inletPts[i][1];
    const bx=inletPts[i+1][0], bz=inletPts[i+1][1];
    // distance from point (x,z) to line segment a-b
    const lx=bx-ax, lz=bz-az;
    const len2=lx*lx+lz*lz;
    let t = ((x-ax)*lx + (z-az)*lz) / Math.max(len2, 1);
    if(t<0) t=0; else if(t>1) t=1;
    const px=ax+lx*t, pz=az+lz*t;
    const d = Math.hypot(x-px, z-pz);
    if(d < 18){
      const dipHere = -3 - (18 - d) * 0.25;
      if(dipHere < inletDip) inletDip = dipHere;
    }
  }
  // Wetland marsh — broad NW patch
  const dw1 = Math.hypot(x-180, z-190);
  const dw2 = Math.hypot(x-160, z-135);
  const dw3 = Math.hypot(x-270, z-350);
  const wetland = Math.min(dw1, dw2, dw3) < 60 ? -1.2 : 0;
  return highland + dune + coast + inletDip + wetland;
}

const pos = terrainGeom.attributes.position;
for(let i=0; i<pos.count; i++){
  const x = pos.getX(i), z = pos.getZ(i);
  pos.setY(i, biomeHeight(x, z));
}
terrainGeom.computeVertexNormals();

const colors = new Float32Array(pos.count * 3);
function biomeColor(wx, wz){
  const x = wx + HALF, z = wz + HALF;
  // Open Gulf water
  if(z < 60) return [0.10, 0.42, 0.78];
  // NW sand barrier (small "desert" pocket)
  if(Math.hypot(x-55, z-220) < 55) return [0.83, 0.71, 0.42];
  // Highland by elevation
  if(biomeHeight(wx, wz) > 10) return [0.42, 0.30, 0.22];
  // Bayou wetland (broad NW + along inlet)
  if(Math.hypot(x-180, z-190) < 75) return [0.22, 0.34, 0.27];
  if(Math.hypot(x-160, z-135) < 50) return [0.22, 0.34, 0.27];
  if(Math.hypot(x-270, z-350) < 45) return [0.22, 0.34, 0.27];
  // S dense cypress (jungle)
  if(z > 515 && x > 240 && x < 510) return [0.11, 0.30, 0.18];
  // NE cypress floor
  if(x > 410 && x < 560 && z > 70 && z < 220) return [0.18, 0.34, 0.20];
  // SW cypress floor
  if(x > 75 && x < 180 && z > 425 && z < 525) return [0.18, 0.34, 0.20];
  // Default bayou plain — slightly darker than open prairie
  return [0.32, 0.42, 0.24];
}
for(let i=0; i<pos.count; i++){
  const c = biomeColor(pos.getX(i), pos.getZ(i));
  colors[i*3]=c[0]; colors[i*3+1]=c[1]; colors[i*3+2]=c[2];
}
terrainGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true });
const terrain = new THREE.Mesh(terrainGeom, terrainMat);
scene.add(terrain);

/* === Open Gulf — N coast === */
const seaGeom = new THREE.PlaneGeometry(MAP_SIZE * 1.4, 80);
seaGeom.rotateX(-Math.PI/2);
const seaMat = new THREE.MeshPhongMaterial({ color: 0x1976d2, transparent: true, opacity: 0.88, shininess: 90 });
const sea = new THREE.Mesh(seaGeom, seaMat);
sea.position.set(0, -3, -HALF + 30);
scene.add(sea);
/* Deep-water NW Gulf bulge */
const deepGulfGeom = new THREE.CircleGeometry(110, 24);
deepGulfGeom.rotateX(-Math.PI/2);
const deepGulfMat = new THREE.MeshPhongMaterial({ color: 0x0d47a1, transparent: true, opacity: 0.9 });
const deepGulf = new THREE.Mesh(deepGulfGeom, deepGulfMat);
const dg = to3(70, 50);
deepGulf.position.set(dg.x, -3.5, dg.z);
scene.add(deepGulf);

/* === Tiny oasis pool inside the W sand barrier === */
const oasisGeom = new THREE.CircleGeometry(13, 18);
oasisGeom.rotateX(-Math.PI/2);
const oasis = new THREE.Mesh(oasisGeom, seaMat.clone());
const oa = to3(55, 225);
oasis.position.set(oa.x, -1.5, oa.z);
scene.add(oasis);

/* === Bayou inlet — main waterway. NW Gulf (90,60) -> SE exit. === */
const riverPath = [];
const bayouCurves = [
  [[90,60],[130,150],[200,220]],
  [[200,220],[250,290],[280,380]],
  [[280,380],[320,480],[380,600]]
];
for(const c of bayouCurves){
  for(let t=0; t<=1.001; t+=0.05){
    const u = t;
    const x = (1-u)*(1-u)*c[0][0] + 2*(1-u)*u*c[1][0] + u*u*c[2][0];
    const y = (1-u)*(1-u)*c[0][1] + 2*(1-u)*u*c[1][1] + u*u*c[2][1];
    riverPath.push([x, y]);
  }
}
function addRiver(){
  for(let i=0; i<riverPath.length-1; i++){
    const a = riverPath[i], b = riverPath[i+1];
    const aw = to3(a[0], a[1]), bw = to3(b[0], b[1]);
    const dx = bw.x - aw.x, dz = bw.z - aw.z;
    const len = Math.hypot(dx, dz);
    if(len < 0.5) continue;
    const angle = Math.atan2(dz, dx);
    const seg = new THREE.Mesh(
      new THREE.PlaneGeometry(len + 6, 36),
      seaMat.clone()
    );
    seg.rotation.x = -Math.PI/2;
    seg.rotation.z = -angle;
    seg.position.set((aw.x+bw.x)/2, -1, (aw.z+bw.z)/2);
    scene.add(seg);
  }
}
addRiver();

/* === Trees (instanced) === */
function addForest(positions, trunkColor, canopyColor, scale){
  const tg = new THREE.CylinderGeometry(1.4, 2.2, 7, 6);
  const cg = new THREE.ConeGeometry(7, 18, 8);
  const tm = new THREE.MeshLambertMaterial({ color: trunkColor });
  const cm = new THREE.MeshLambertMaterial({ color: canopyColor });
  const trunk = new THREE.InstancedMesh(tg, tm, positions.length);
  const canopy = new THREE.InstancedMesh(cg, cm, positions.length);
  const dummy = new THREE.Object3D();
  for(let i=0; i<positions.length; i++){
    const w = to3(positions[i][0], positions[i][1]);
    const h = biomeHeight(w.x, w.z);
    const s = scale * (0.85 + Math.random()*0.3);
    dummy.position.set(w.x, h + 3*s, w.z);
    dummy.scale.set(s, s, s);
    dummy.rotation.y = Math.random() * Math.PI * 2;
    dummy.updateMatrix();
    trunk.setMatrixAt(i, dummy.matrix);
    dummy.position.set(w.x, h + 13*s, w.z);
    dummy.updateMatrix();
    canopy.setMatrixAt(i, dummy.matrix);
  }
  scene.add(trunk); scene.add(canopy);
}

const neForest = [];
for(let i=0; i<28; i++) neForest.push([410 + Math.random()*150, 75 + Math.random()*145]);
addForest(neForest, 0x5d4037, 0x4a7d35, 1.0);  // bayou cypress — slightly more saturated

const swForest = [];
for(let i=0; i<14; i++) swForest.push([80 + Math.random()*105, 430 + Math.random()*100]);
addForest(swForest, 0x5d4037, 0x4a7d35, 0.9);

/* === Dense southern cypress band (jungle anchor) */
const junglePos = [];
for(let i=0; i<22; i++) junglePos.push([245 + Math.random()*260, 520 + Math.random()*55]);
function addPalms(positions){
  const tg = new THREE.CylinderGeometry(0.9, 1.6, 16, 5);
  const cg = new THREE.ConeGeometry(11, 5, 8);
  const tm = new THREE.MeshLambertMaterial({ color: 0x6d4c41 });
  const cm = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
  const trunk = new THREE.InstancedMesh(tg, tm, positions.length);
  const fronds = new THREE.InstancedMesh(cg, cm, positions.length);
  const dummy = new THREE.Object3D();
  for(let i=0; i<positions.length; i++){
    const w = to3(positions[i][0], positions[i][1]);
    const h = biomeHeight(w.x, w.z);
    dummy.position.set(w.x, h + 8, w.z);
    dummy.scale.set(1,1,1);
    dummy.rotation.set(0, Math.random()*Math.PI*2, 0);
    dummy.updateMatrix();
    trunk.setMatrixAt(i, dummy.matrix);
    dummy.position.set(w.x, h + 17, w.z);
    dummy.updateMatrix();
    fronds.setMatrixAt(i, dummy.matrix);
  }
  scene.add(trunk); scene.add(fronds);
}
addPalms(junglePos);

/* === Highland — terrain heightmap already raises the plateau in two
   sections. We add subtle plateau-top slabs so the cliff edge reads
   sharply, and rocky boulders for texture. */
function addPlateauSlab(modX, modY, w, d){
  const top = new THREE.MeshLambertMaterial({ color: 0x9e7b66, flatShading: true });
  const slab = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), top);
  const p = to3(modX, modY);
  slab.position.set(p.x, biomeHeight(p.x, p.z) + 1, p.z);
  scene.add(slab);
}
addPlateauSlab(515, 240, 100, 80);   // N limestone plateau
addPlateauSlab(515, 365, 100, 70);   // S limestone plateau

function addBoulder(modX, modY, size){
  const p = to3(modX, modY);
  const m = new THREE.Mesh(
    new THREE.IcosahedronGeometry(size, 0),
    new THREE.MeshLambertMaterial({ color: 0x6d4c41, flatShading: true })
  );
  m.position.set(p.x, biomeHeight(p.x, p.z) + size*0.6, p.z);
  m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
  scene.add(m);
}
addBoulder(490, 220, 6); addBoulder(545, 270, 5);
addBoulder(495, 345, 5); addBoulder(545, 380, 6);

/* === Resource markers === */
function addGoldDeposit(modX, modY){
  const p = to3(modX, modY);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(22, 4, 22),
    new THREE.MeshLambertMaterial({ color: 0x2c2520 })
  );
  base.position.set(p.x, 2 + biomeHeight(p.x, p.z), p.z);
  scene.add(base);
  const mat = new THREE.MeshLambertMaterial({ color: 0xffd54f });
  for(let i=0; i<3; i++){
    const nug = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 0), mat);
    nug.position.set(p.x + (i-1)*5, 5 + biomeHeight(p.x, p.z), p.z + (i%2)*4 - 2);
    scene.add(nug);
  }
}
addGoldDeposit(115, 285);   // wetland/desert edge
addGoldDeposit(395, 130);   // NE forest edge
addGoldDeposit(425, 460);   // between river and S highland

function addHuntable(modX, modY){
  const p = to3(modX, modY);
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(3.5, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0x5d4037 })
  );
  m.scale.set(1.6, 1, 1);
  m.position.set(p.x, 3 + biomeHeight(p.x, p.z), p.z);
  scene.add(m);
}
[[330,215],[355,230],[345,250],[170,410],[195,425]].forEach(p => addHuntable(p[0], p[1]));

function addBerry(modX, modY){
  const p = to3(modX, modY);
  const bush = new THREE.Mesh(
    new THREE.SphereGeometry(5, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0x2e5c2e })
  );
  bush.position.set(p.x, 3 + biomeHeight(p.x, p.z), p.z);
  scene.add(bush);
  const berryMat = new THREE.MeshLambertMaterial({ color: 0xc62828 });
  for(let i=0; i<5; i++){
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.9, 6, 4), berryMat);
    b.position.set(p.x + Math.cos(i)*3, 5 + biomeHeight(p.x, p.z), p.z + Math.sin(i)*3);
    scene.add(b);
  }
}
addBerry(395, 320); addBerry(410, 335);

function addTradeSocket(modX, modY){
  const p = to3(modX, modY);
  const stone = new THREE.Mesh(
    new THREE.BoxGeometry(20, 5, 20),
    new THREE.MeshLambertMaterial({ color: 0x5d4037 })
  );
  stone.position.set(p.x, 2.5 + biomeHeight(p.x, p.z), p.z);
  scene.add(stone);
  const flag = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 14, 5),
    new THREE.MeshLambertMaterial({ color: 0xffb74d })
  );
  flag.position.set(p.x, 12 + biomeHeight(p.x, p.z), p.z);
  scene.add(flag);
}
addTradeSocket(90, 540); addTradeSocket(330, 330); addTradeSocket(555, 120);

function addNativeVillage(modX, modY){
  const p = to3(modX, modY);
  const huts = [[0,-6],[-9,5],[9,5]];
  for(let i=0; i<huts.length; i++){
    const hx = p.x + huts[i][0], hz = p.z + huts[i][1];
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(8, 5, 8),
      new THREE.MeshLambertMaterial({ color: 0x8d6e63 })
    );
    base.position.set(hx, 2.5 + biomeHeight(hx, hz), hz);
    scene.add(base);
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(6.5, 4, 4),
      new THREE.MeshLambertMaterial({ color: 0xbcaaa4 })
    );
    roof.rotation.y = Math.PI/4;
    roof.position.set(hx, 7 + biomeHeight(hx, hz), hz);
    scene.add(roof);
  }
}
addNativeVillage(135, 290);  // NW plain hummock
addNativeVillage(265, 530);  // S jungle edge
addNativeVillage(440, 360);  // E highland foot

/* === Gulf barrier islands NW (Bayou map convention) === */
function addBarrierIsland(modX, modY, r){
  const p = to3(modX, modY);
  const isl = new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.85, r, 6, 16),
    new THREE.MeshLambertMaterial({ color: 0x6a8a48 })
  );
  isl.position.set(p.x, -2, p.z);
  scene.add(isl);
}
addBarrierIsland(55, 35, 26);
addBarrierIsland(115, 50, 14);
/* Single tree on the larger island */
const islTree = new THREE.Mesh(
  new THREE.ConeGeometry(5, 12, 6),
  new THREE.MeshLambertMaterial({ color: 0x4a8c3d })
);
const islTp = to3(55, 35);
islTree.position.set(islTp.x, 8, islTp.z);
scene.add(islTree);

/* === Spawn marker (subtle ring on the ground) === */
function addSpawnMarker(){
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(38, 42, 48),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI/2;
  const p = to3(300, 330);
  ring.position.set(p.x, biomeHeight(p.x, p.z) + 0.3, p.z);
  scene.add(ring);
}
addSpawnMarker();

/* === Per-nation building group (cleared and rebuilt per profile) === */
const buildingGroup = new THREE.Group();
scene.add(buildingGroup);

function clearBuildings(){
  while(buildingGroup.children.length){
    const c = buildingGroup.children[0];
    buildingGroup.remove(c);
    if(c.geometry) c.geometry.dispose();
    if(c.material) c.material.dispose();
  }
}

/* Building primitives — placeholder boxes until Kenney models swap in */
function placeTC(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(60, 32, 60),
    new THREE.MeshLambertMaterial({ color: 0xb71c1c })
  );
  base.position.set(p.x, 16 + h, p.z);
  buildingGroup.add(base);
  // 4 corner towers
  const cols = [[-26,-26],[26,-26],[-26,26],[26,26]];
  for(const c of cols){
    const t = new THREE.Mesh(
      new THREE.BoxGeometry(10, 44, 10),
      new THREE.MeshLambertMaterial({ color: 0x7f0000 })
    );
    t.position.set(p.x + c[0], 22 + h, p.z + c[1]);
    buildingGroup.add(t);
  }
  // Banner pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.7, 0.7, 24, 6),
    new THREE.MeshLambertMaterial({ color: 0xfff8e1 })
  );
  pole.position.set(p.x, 44 + h, p.z);
  buildingGroup.add(pole);
}
function placeHouse(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(20, 12, 20),
    new THREE.MeshLambertMaterial({ color: 0xbcaaa4 })
  );
  base.position.set(p.x, 6 + h, p.z);
  buildingGroup.add(base);
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(15, 8, 4),
    new THREE.MeshLambertMaterial({ color: 0xfdd835 })
  );
  roof.rotation.y = Math.PI/4;
  roof.position.set(p.x, 16 + h, p.z);
  buildingGroup.add(roof);
}
function placeMill(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(24, 14, 24),
    new THREE.MeshLambertMaterial({ color: 0xa1887f })
  );
  base.position.set(p.x, 7 + h, p.z);
  buildingGroup.add(base);
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(18, 10, 4),
    new THREE.MeshLambertMaterial({ color: 0x43a047 })
  );
  roof.rotation.y = Math.PI/4;
  roof.position.set(p.x, 19 + h, p.z);
  buildingGroup.add(roof);
}
function placeBarracks(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(30, 14, 22),
    new THREE.MeshLambertMaterial({ color: 0x1e88e5 })
  );
  base.position.set(p.x, 7 + h, p.z);
  buildingGroup.add(base);
  const banner = new THREE.Mesh(
    new THREE.BoxGeometry(34, 4, 26),
    new THREE.MeshLambertMaterial({ color: 0x0d47a1 })
  );
  banner.position.set(p.x, 16 + h, p.z);
  buildingGroup.add(banner);
}
function placeOutpost(modX, modY, color){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(14, 28, 14),
    new THREE.MeshLambertMaterial({ color: color || 0xb39ddb })
  );
  base.position.set(p.x, 14 + h, p.z);
  buildingGroup.add(base);
  const cap = new THREE.Mesh(
    new THREE.BoxGeometry(18, 4, 18),
    new THREE.MeshLambertMaterial({ color: color === 0xffb74d ? 0xbf360c : 0x311b92 })
  );
  cap.position.set(p.x, 30 + h, p.z);
  buildingGroup.add(cap);
}
function placeFort(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(75, 28, 75),
    new THREE.MeshLambertMaterial({ color: 0x4e342e })
  );
  base.position.set(p.x, 14 + h, p.z);
  buildingGroup.add(base);
  // Bastions at corners
  const cols = [[-32,-32],[32,-32],[-32,32],[32,32]];
  for(const c of cols){
    const b = new THREE.Mesh(
      new THREE.OctahedronGeometry(10),
      new THREE.MeshLambertMaterial({ color: 0x3e2723 })
    );
    b.position.set(p.x + c[0], 28 + h, p.z + c[1]);
    buildingGroup.add(b);
  }
  // Inner keep
  const keep = new THREE.Mesh(
    new THREE.BoxGeometry(28, 22, 28),
    new THREE.MeshLambertMaterial({ color: 0x6d4c41 })
  );
  keep.position.set(p.x, 39 + h, p.z);
  buildingGroup.add(keep);
}
function placeWallSeg(modX, modY){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const w = new THREE.Mesh(
    new THREE.BoxGeometry(7, 8, 7),
    new THREE.MeshLambertMaterial({ color: 0x9e9e9e })
  );
  w.position.set(p.x, 4 + h, p.z);
  buildingGroup.add(w);
}
function placeHeadingArrow(modX, modY, ang){
  const p = to3(modX, modY);
  const h = biomeHeight(p.x, p.z);
  const len = 90;
  const shaft = new THREE.Mesh(
    new THREE.BoxGeometry(len, 2, 4),
    new THREE.MeshBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.85 })
  );
  shaft.position.set(p.x + Math.cos(ang)*len/2, h + 1, p.z + Math.sin(ang)*len/2);
  shaft.rotation.y = -ang;
  buildingGroup.add(shaft);
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(8, 14, 4),
    new THREE.MeshBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.9 })
  );
  head.rotation.z = -Math.PI/2;
  head.rotation.y = -ang;
  head.position.set(p.x + Math.cos(ang)*len, h + 1, p.z + Math.sin(ang)*len);
  buildingGroup.add(head);
}

/* === Placement math — bit-identical to LEGENDARY_LEADERS_TREE.html === */
const SPAWN_TC = { x: 300, y: 300 };
const FEATURE = {
  coast:    { x: 300, y:  35 },
  river:    { x: 250, y: 290 },
  forest:   { x: 470, y: 130 },
  plain:    { x: 300, y: 300 },
  highland: { x: 520, y: 290 },
  wetland:  { x: 180, y: 200 },
  desert:   { x:  60, y: 220 },
  jungle:   { x: 370, y: 545 }
};
const HEADING_TARGET = {
  alongCoast: { x: 555, y:  35 },
  upriver:    { x: 380, y: 560 },
  frontier:   { x: 575, y: 300 },
  islandHop:  { x:  55, y:  35 },
  outward:    null,
  trade:      { x:  90, y: 540 },
  defensive:  null
};
function terrainAnchor(tId){
  if(tId===1) return FEATURE.coast;
  if(tId===2) return FEATURE.river;
  if(tId===3) return FEATURE.forest;
  if(tId===4) return FEATURE.plain;
  if(tId===5) return FEATURE.highland;
  if(tId===6) return FEATURE.wetland;
  if(tId===7) return FEATURE.desert;
  if(tId===8) return FEATURE.jungle;
  return SPAWN_TC;
}
function headingAnchor(hId){
  if(hId===1) return HEADING_TARGET.alongCoast;
  if(hId===2) return HEADING_TARGET.upriver;
  if(hId===3) return HEADING_TARGET.frontier;
  if(hId===4) return HEADING_TARGET.islandHop;
  if(hId===6) return HEADING_TARGET.trade;
  return null;
}
function blend(a, b, s){
  if(!a) return b; if(!b) return a;
  return { x: a.x*(1-s) + b.x*s, y: a.y*(1-s) + b.y*s };
}

function renderProfile(profile){
  clearBuildings();
  const v = profile.v;

  let anchor = { x: SPAWN_TC.x, y: SPAWN_TC.y };
  const t1 = terrainAnchor(v.terrainPrimary);
  if(t1 && v.terrainPrimary !== 0) anchor = blend(anchor, t1, v.terrainBias);
  const t2 = terrainAnchor(v.terrainSecondary);
  if(t2 && v.terrainSecondary !== 0) anchor = blend(anchor, t2, v.terrainBias * 0.5);
  const hA = headingAnchor(v.heading);
  if(hA) anchor = blend(anchor, hA, v.headingBias);

  const cx = anchor.x, cy = anchor.y;
  let headingAngle = null;
  if(hA){
    const dx = hA.x - cx, dy = hA.y - cy;
    headingAngle = Math.atan2(dy, dx);
  }

  const houseR = 75 * v.houseMult;
  const ecoR   = 120 * v.ecoMult;
  const milR   = 160 * v.milMult;
  const wallR  = 195 * v.tcMult;

  // Walls first (under buildings)
  if(v.wallStrategy !== 5 && v.wallLevel > 0){
    const segCount = Math.max(20, Math.round(2*Math.PI*wallR/22));
    const ws = v.wallStrategy;
    const hAng = headingAngle || 0;
    for(let s=0; s<segCount; s++){
      const ang = s*(2*Math.PI/segCount);
      let keep = false;
      if(ws===0) keep = true;
      else if(ws===1){
        const rel = ((ang - hAng)%(2*Math.PI) + 2*Math.PI)%(2*Math.PI);
        keep = (rel<0.7) || (rel>2.0 && rel<2.7) || (rel>4.0 && rel<4.7);
      } else if(ws===2){
        keep = Math.sin(ang) > -0.15;
      } else if(ws===3){
        const relF = ((ang - hAng)%(2*Math.PI) + 2*Math.PI)%(2*Math.PI);
        keep = (relF < 1.4) || (relF > (2*Math.PI - 1.4));
      } else if(ws===4){
        keep = true;
      }
      if(!keep) continue;
      const r = (ws===4) ? wallR*0.75 : wallR;
      placeWallSeg(cx + Math.cos(ang)*r, cy + Math.sin(ang)*r);
    }
  }

  // Forts
  if(v.fortLevel > 0){
    for(let f=0; f<v.fortLevel; f++){
      const a = f*(2*Math.PI/v.fortLevel) + 1.7 + (headingAngle || 0);
      placeFort(cx + Math.cos(a)*milR*1.1, cy + Math.sin(a)*milR*1.1);
    }
  }

  // Barracks
  for(let b=0; b<3; b++){
    const a = b*(2*Math.PI/3) + 0.5 + (headingAngle || 0);
    placeBarracks(cx + Math.cos(a)*milR, cy + Math.sin(a)*milR);
  }

  // Mills
  for(let e=0; e<4; e++){
    const a = e*(2*Math.PI/4) + 0.8;
    placeMill(cx + Math.cos(a)*ecoR, cy + Math.sin(a)*ecoR);
  }

  // Outposts
  if(v.towerLevel > 0){
    const n = v.towerLevel + 1;
    for(let t=0; t<n; t++){
      const a = t*(2*Math.PI/n) + 1.4;
      placeOutpost(cx + Math.cos(a)*ecoR*1.05, cy + Math.sin(a)*ecoR*1.05);
    }
  }

  // Forward towers along heading
  if(v.fwdTowers > 0 && headingAngle !== null){
    for(let t=0; t<v.fwdTowers; t++){
      const td = wallR*0.95 + t*30;
      placeOutpost(cx + Math.cos(headingAngle)*td, cy + Math.sin(headingAngle)*td, 0xffb74d);
    }
  }

  // Houses
  for(let h=0; h<6; h++){
    const a = h*(2*Math.PI/6) + 0.3;
    placeHouse(cx + Math.cos(a)*houseR, cy + Math.sin(a)*houseR);
  }

  // Heading arrow on the ground
  if(headingAngle !== null){
    placeHeadingArrow(cx, cy, headingAngle);
  }

  // Town Center last
  placeTC(cx, cy);

  // HUD
  document.getElementById('hudTitle').textContent = profile.name + ' — ' + profile.leader;
  document.getElementById('hudSubtitle').innerHTML =
    '<strong>Terrain:</strong> ' + profile.terrainLabel +
    ' &nbsp;<strong>Heading:</strong> ' + profile.headingLabel +
    '<br/><strong>Walls:</strong> ' + profile.wallLabel +
    ' &nbsp;<strong>Style:</strong> ' + profile.style +
    '<br/><span style="opacity:.55">One-finger rotate · Two-finger pan · Pinch to zoom</span>';

  // Recenter the camera on the new TC position
  controls.target.set(to3(cx, cy).x, 8, to3(cx, cy).z);
}

/* === Profile data — fetch from main HTML === */
async function loadProfiles(){
  const res = await fetch('LEGENDARY_LEADERS_TREE.html', { cache: 'no-cache' });
  const txt = await res.text();
  const start = txt.indexOf('window.NATION_PROFILES');
  const end = txt.indexOf('})();', start) + 5;
  const code = txt.substring(start, end);
  // Run in this scope to populate window.NATION_PROFILES
  new Function(code)();
  return window.NATION_PROFILES;
}

const profiles = await loadProfiles();

const sel = document.getElementById('nationSelect');
const standard = ["Aztecs","British","Chinese","Dutch","Ethiopians","French","Germans","Iroquois","Hausa","Inca","Indians","Italians","Japanese","Lakota","Maltese","Mexicans","Ottomans","Portuguese","Russians","Spanish","Swedish","Americans"];
function addOptGroup(label, keys){
  const og = document.createElement('optgroup');
  og.label = label;
  keys.forEach(k => {
    if(!profiles[k]) return;
    const o = document.createElement('option');
    o.value = k;
    o.textContent = profiles[k].name + ' — ' + profiles[k].leader;
    og.appendChild(o);
  });
  sel.appendChild(og);
}
addOptGroup('Standard civs', standard);
const revolutionKeys = Object.keys(profiles).filter(k => standard.indexOf(k)<0);
addOptGroup('Revolutions', revolutionKeys);

sel.addEventListener('change', () => renderProfile(profiles[sel.value]));

// Read ?nation=Foo from URL if present (so the modal can deep-link)
const initial = new URLSearchParams(location.search).get('nation') || 'Aztecs';
sel.value = profiles[initial] ? initial : 'Aztecs';
renderProfile(profiles[sel.value]);

document.getElementById('loading').style.display = 'none';

/* === Resize === */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* === Animation loop with FPS counter === */
const fpsEl = document.getElementById('fps');
let frames = 0, last = performance.now();
function tick(){
  requestAnimationFrame(tick);
  controls.update();
  renderer.render(scene, camera);
  frames++;
  const now = performance.now();
  if(now - last > 1000){
    fpsEl.textContent = Math.round(frames * 1000 / (now - last)) + ' fps';
    frames = 0; last = now;
  }
}
tick();
</script>
